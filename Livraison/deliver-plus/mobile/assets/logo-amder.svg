<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7165E0"/>
      <stop offset="55%"  stop-color="#4B42B8"/>
      <stop offset="100%" stop-color="#28237A"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
  </defs>

  <!-- ── Fond arrondi ── -->
  <rect width="1024" height="1024" rx="210" fill="url(#bgGrad)"/>

  <!-- ── Reflet lumineux haut-gauche ── -->
  <ellipse cx="280" cy="250" rx="320" ry="260" fill="rgba(255,255,255,0.06)"/>

  <!-- ── Cercle décoratif bas-droit ── -->
  <circle cx="870" cy="810" r="220" fill="rgba(255,255,255,0.03)"/>

  <!-- ══ Lettre A – jambe gauche ══ -->
  <line x1="162" y1="750" x2="512" y2="185"
        stroke="white" stroke-width="96" stroke-linecap="round"
        filter="url(#softShadow)"/>

  <!-- ══ Lettre A – jambe droite ══ -->
  <line x1="862" y1="750" x2="512" y2="185"
        stroke="white" stroke-width="96" stroke-linecap="round"
        filter="url(#softShadow)"/>

  <!-- ══ Flèche barre transversale ══ -->
  <!-- Corps de la flèche -->
  <path d="M 275,498 L 718,498 L 718,452 L 820,525 L 718,598 L 718,552 L 275,552 Z"
        fill="url(#arrowGrad)" filter="url(#glow)"/>

  <!-- ── Point lumineux apex ── -->
  <circle cx="512" cy="188" r="22" fill="#FBBF24" opacity="0.9"/>

  <!-- ══ Texte AMDER ══ -->
  <text x="512" y="872"
    font-family="'Arial Black','Helvetica Neue',Helvetica,sans-serif"
    font-size="138"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="28"
    opacity="0.97">AMDER</text>

  <!-- ── Ligne séparatrice ── -->
  <rect x="180" y="895" width="664" height="3" rx="2" fill="rgba(255,255,255,0.18)"/>

  <!-- ── Sous-titre ── -->
  <text x="512" y="960"
    font-family="'Arial','Helvetica Neue',Helvetica,sans-serif"
    font-size="38"
    font-weight="400"
    fill="rgba(255,255,255,0.55)"
    text-anchor="middle"
    letter-spacing="11">LIVRAISON &amp; TRANSPORT</text>
</svg>
